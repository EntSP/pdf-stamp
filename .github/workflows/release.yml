# Release workflow for pdf-stamp
#
# Triggered by pushing a tag `v*` (e.g. `v0.2.0`). Builds release
# binaries for Linux x86_64, macOS aarch64 and Windows x86_64, then
# publishes them as GitHub release artefacts. Mirrors the markdoc-pdf
# release workflow.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed for the release-creating step

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pdf-stamp
            asset:    pdf-stamp-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pdf-stamp
            asset:    pdf-stamp-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pdf-stamp.exe
            asset:    pdf-stamp-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --bin pdf-stamp

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} staging/${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: staging/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Show what we collected
        run: ls -lh artifacts

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
